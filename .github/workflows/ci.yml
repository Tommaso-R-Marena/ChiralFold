name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxrender1 libxext6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "rdkit>=2023.3" || pip install rdkit-pypi
          pip install -e ".[dev]"

      # NOTE: `-m "not slow"` excludes tests marked @pytest.mark.slow, which
      # cover network-dependent benchmarks (RCSB structure downloads, wwPDB
      # validation XML fetches for the MolProbity comparison) and long-running
      # compute (the >=100-structure Ramachandran benchmark and full Childs et al.
      # 2025 enumeration). These are designed to be run manually or in scheduled
      # benchmark workflows, not on every PR/push.
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -m "not slow"

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=chiralfold --cov-report=xml -m "not slow"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
